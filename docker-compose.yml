services:
  # PostgreSQL数据库
  postgres:
    image: postgres:16-alpine
    container_name: opc-postgres
    environment:
      POSTGRES_USER: opc
      POSTGRES_PASSWORD: opc123456
      POSTGRES_DB: opc_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opc"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: opc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data: